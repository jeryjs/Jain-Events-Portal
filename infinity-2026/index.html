<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --text: #f6efe6;
      --accent: #d7b46a;
      --card-border: rgba(255, 255, 255, 0.08);
      --logo-size: 80px;
      --logo-gap: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: "Work Sans", "Segoe UI", sans-serif;
      background: #050608;
      color: var(--text);
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .logo-corner {
      position: fixed;
      top: var(--logo-gap);
      left: var(--logo-gap);
      z-index: 3;
      width: var(--logo-size);
      height: auto;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.55));
      pointer-events: none;
    }

    .panel {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      transition: opacity 0.1s linear;
      pointer-events: none;
    }

    .panel-a {
      background-image: url("assets/bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.04);
    }

    .panel-b {
      background: radial-gradient(circle at top, rgba(215, 180, 106, 0.08), rgba(5, 6, 8, 0.9) 60%), linear-gradient(180deg, #0b0c10, #040405);
    }

    .panel-c {
      background-image: url("assets/bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.03);
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.35) 60%, rgba(0, 0, 0, 0.5));
      opacity: 0.35;
      pointer-events: none;
    }

    .title {
      font-family: "Bebas Neue", "Work Sans", sans-serif;
      font-size: clamp(3rem, 12vw, 9rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--text);
      text-shadow: 0 18px 60px rgba(0, 0, 0, 0.7);
      transform: translate3d(0, 40px, 0) scale(0.7);
      opacity: 0;
      will-change: transform, opacity;
    }

    .title span {
      display: block;
    }

    .title .accent {
      color: var(--accent);
    }

    .hint {
      margin-top: 16px;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(246, 239, 230, 0.75);
    }

    .card {
      max-width: 900px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      scrollbar-gutter: stable;
      pointer-events: auto;
      text-align: left;
      padding: 36px 32px;
      border-radius: 22px;
      background: rgba(8, 10, 12, 0.7);
      border: 1px solid var(--card-border);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      opacity: 0;
      transform: translate3d(0, 30px, 0) scale(0.96);
      will-change: transform, opacity;
    }

    .card::-webkit-scrollbar {
      width: 8px;
    }

    .card::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
    }

    .card::-webkit-scrollbar-thumb {
      background: rgba(215, 180, 106, 0.45);
      border-radius: 999px;
    }

    .card::-webkit-scrollbar-thumb:hover {
      background: rgba(215, 180, 106, 0.65);
    }

    .card h2 {
      margin: 0 0 16px 0;
      font-family: "Bebas Neue", "Work Sans", sans-serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffe7b0;
      text-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    }

    .card p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.85;
      color: rgba(246, 239, 230, 0.9);
    }

    /* Events Grid */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .event-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      text-align: left;
    }

    .event-card:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
    }

    .event-card h3 {
      margin: 0 0 8px 0;
      color: #ffe7b0;
      font-size: 1.2rem;
    }

    .event-card p {
      font-size: 0.9rem;
      margin: 0 0 8px 0;
    }

    .event-type {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(215, 180, 106, 0.2);
      color: var(--accent);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #111;
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      position: relative;
      transform: scale(0.95);
      transition: transform 0.3s, opacity 0.3s;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-title {
      color: #ffe7b0;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.5rem;
      margin: 0 0 8px 0;
      letter-spacing: 0.1em;
    }

    .modal-club {
      color: rgba(246, 239, 230, 0.7);
      margin: 0 0 24px 0;
    }

    .modal-buttons {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
      flex: 1;
      min-width: 140px;
      transition: all 0.2s;
      border: 1px solid transparent;
      line-height: 1.4;
      box-sizing: border-box;
    }

    .btn:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
    }

    .scroll-space {
      height: 1000vh;
    }

    @media (max-width: 768px) {
      :root {
        --logo-size: 52px;
        --logo-gap: 12px;
      }

      .panel-c {
        padding: 112px 20px 24px 20px;
      }

      .card {
        max-height: calc(100vh - 156px);
        padding: 28px 22px;
      }

      .card h2 {
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>

<body>
  <img class="logo-corner" src="assets/infinity.png" alt="Infinity logo">

  <div class="vignette"></div>
  <div class="scroll-space"></div>

  <script>
    const eventsData = [
      // Technical Events
      { inRegisterLink: "#", outRegisterLink: "#", name: "GRID GAMBIT", club: "AI-Devops, CPS", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "BID & BYTE", club: "CRYPTO COLLAB CE, TURING CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "AMONG US", club: "FOSS CLUB, DATA AI CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "JAINS GOT TALENT", club: "CLOUD CLUB, ENIGMA CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "OPERATION RED TROPHY", club: "SALUS CLUB, NEURON CLUB, COGNITO CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "BID TO BUILD", club: "ZIGBEE CLUB, ANOVA CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "SHARK TANK REVERSED", club: "ECHO CLUB, GDG CLUB", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "FORGE & FLUX", club: "CORE TEAM", css: "", type: "technical" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "UAV DESIGN COMP", club: "AEROSPACE TEAM", css: "", type: "technical" },
      
      // Cultural Events
      { inRegisterLink: "#", outRegisterLink: "#", name: "Multiverse Conclave", club: "Literature club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Origin Protocol", club: "Literature club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Film Festival", club: "Celluloid Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Indian cinema Day", club: "Theatre Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Game of Thrones", club: "Gravel & Globe", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Micdrop", club: "Oraters Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "What If? (Debate)", club: "Oraters Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Monologue", club: "Symphony Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Frequency frenzy", club: "Symphony Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Battle of Bands", club: "Symphony Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Capture the Moment", club: "Photography Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Veil Of Verse", club: "Fashion Club", css: "", type: "cultural" },
      { inRegisterLink: "#", outRegisterLink: "#", name: "Treasure Hunt", club: "Art and Crafts Club", css: "", type: "cultural" },
    ];

    // --- Modal Logic ---
    function openModal(eventIndex) {
      const event = eventsData[eventIndex];
      const modal = document.querySelector('.modal-overlay');
      modal.querySelector('.modal-title').textContent = event.name;
      modal.querySelector('.modal-club').textContent = 'By: ' + event.club;
      
      const inLink = modal.querySelector('.btn-primary');
      inLink.href = event.inRegisterLink;
      
      const outLink = modal.querySelector('.btn-secondary');
      outLink.href = event.outRegisterLink;
      
      modal.classList.add('active');
    }

    function closeModal() {
      document.querySelector('.modal-overlay').classList.remove('active');
    }

    // Modal HTML
    const modalHTML = `
      <div class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal()">&times;</button>
          <h2 class="modal-title"></h2>
          <p class="modal-club"></p>
          <div class="modal-buttons">
            <a href="#" class="btn btn-primary" target="_blank">REGISTER</a>
            <a href="#" class="btn btn-secondary" target="_blank">VIEW EVENT DETAILS</a>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHTML);
  </script>

  <script>
    // --- 1. Panel Creation Functions ---

    function createPanelA() {
      const panel = document.createElement('section');
      panel.className = 'panel panel-a';
      panel.innerHTML = `<div class="hint">Scroll down</div>`;
      return panel;
    }

    function createPanelB() {
      const panel = document.createElement('section');
      panel.className = 'panel panel-b';
      
      const title = document.createElement('div');
      title.className = 'title';
      title.innerHTML = `<span>INFINITY</span><span class="accent">2026</span>`;
      
      panel.appendChild(title);
      panel.titleElement = title; 
      
      return panel;
    }

    function createPanelC() {
      const panel = document.createElement('section');
      panel.className = 'panel panel-c';
      
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>About Faculty of Engineering &amp; Technology</h2>
        <p>
          With a decade of experience, the Faculty of Engineering &amp; Technology at JAIN
          (Deemed-to-be University) (JU-FET) is the prominent engineering institution in Bengaluru.
          B.Tech., M.Tech., and specialised programmes are available at JU-FET. JU-FET is committed
          to delivering an education of the highest calibre. By utilising the practical and
          forward-thinking approach, in addition to the superior teaching and research facilities,
          students will receive a unique and high-caliber academic experience that is centred on
          skill and knowledge development. This will facilitate a seamless transition from
          academia to the business world.
        </p>
      `;
      
      panel.appendChild(card);
      panel.cardElement = card;
      
      return panel;
    }

    function createPanelD() {
      const panel = document.createElement('section');
      panel.className = 'panel panel-c'; // Reusing panel-c background styling
      
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>About Infinity Fest</h2>
        <p>
          Infinity Fest is a vibrant celebration where culture meets innovation, filled with energy, excitement, and creativity. It provides students a platform to showcase their talents, connect with diverse backgrounds, and experience an unforgettable journey of learning and expression.
        </p>

        <h2>About The Cultural Club at FET-JU</h2>
        <p>
          The Cultural Club at FET-JU nurtures creativity and celebrates diverse talents by offering a platform for students to explore, showcase, and enhance their skills. Through various events and competitions, it promotes confidence, teamwork, and a vibrant community spirit.
        </p>
      `;
      
      panel.appendChild(card);
      panel.cardElement = card;
      
      return panel;
    }

    function createPanelE() {
      const panel = document.createElement('section');
      panel.className = 'panel panel-c'; 
      
      const card = document.createElement('div');
      card.className = 'card';
      card.style.maxWidth = '1100px'; // wider for the grid
      
      let eventsHTML = '<div class="events-grid">';
      eventsData.forEach((ev, index) => {
        eventsHTML += `
          <div class="event-card" onclick="openModal(${index})">
            <h3>${ev.name}</h3>
            <p>${ev.club}</p>
            <span class="event-type">${ev.type}</span>
          </div>
        `;
      });
      eventsHTML += '</div>';

      card.innerHTML = `
        <h2>Explore Infinity Events</h2>
        <p>Discover technical and cultural events curated by various clubs.</p>
        ${eventsHTML}
      `;
      
      panel.appendChild(card);
      panel.cardElement = card;
      
      return panel;
    }

    // --- 2. Initialize Panels ---

    const panelA = createPanelA();
    const panelB = createPanelB();
    const panelC = createPanelC();
    const panelD = createPanelD();
    const panelE = createPanelE();

    // Insert panels into the document (before the vignette/scroll-space)
    const vignette = document.querySelector('.vignette');
    document.body.insertBefore(panelA, vignette);
    document.body.insertBefore(panelB, vignette);
    document.body.insertBefore(panelC, vignette);
    document.body.insertBefore(panelD, vignette);
    document.body.insertBefore(panelE, vignette);
    
    // --- 3. Animation Logic ---

    function clamp01(v) {
      return Math.min(Math.max(v, 0), 1);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    // Group panels into an array to dynamically handle N panels
    const panels = [panelA, panelB, panelC, panelD, panelE];
    const numTransitions = panels.length - 1;

    // A dynamic array to keep track of current progress for each transition
    let currents = new Array(numTransitions).fill(0);

    function update() {
      const scroll = window.scrollY;
      const h = window.innerHeight;
      const SCROLL_FACTOR = 1.1;
      
      let prevEnd = 0;

      // 1. Calculate step targets dynamically
      for (let i = 0; i < numTransitions; i++) {
        // The first transition happens over `h`, subsequent ones take `h * SCROLL_FACTOR`
        const duration = i === 0 ? h : h * SCROLL_FACTOR;
        const target = clamp01((scroll - prevEnd) / duration);
        
        // Lerp to specific target
        currents[i] = lerp(currents[i], target, 0.03);
        
        // Shift start point for next transition
        prevEnd += duration; 
      }

      // 2. Map transition currents to panel opacities dynamically
      const opacities = panels.map((_, i) => {
        if (i === 0) return 1 - currents[0]; // First panel fades out
        if (i === panels.length - 1) return currents[i - 1]; // Last panel fades in and stays
        
        // Middle panels: depend on previous transition finishing and next starting
        return currents[i - 1] * (1 - currents[i]);
      });

      // 3. Apply opacity and visibility dynamically
      panels.forEach((panel, i) => {
        const op = opacities[i];
        panel.style.opacity = op.toString();
        // Give fully opaque panels a higher z-index so they don't get covered by transparent siblings
        panel.style.zIndex = op > 0.98 ? '2' : '0';
        panel.style.visibility = op > 0.05 ? 'visible' : 'hidden';
        
        // Only allow scrolling/interaction when the panel is fully bright/active
        if (panel.cardElement) {
          panel.cardElement.style.pointerEvents = op > 0.98 ? 'auto' : 'none';
        }
      });

      // 4. Panel-specific transforms
      // Apply transforms using the related transition index in our `currents` array (0 = T1, 1 = T2, 2 = T3)
      if (panels.length > 1 && panelB.titleElement) {
        const scaleB = 0.7 + (currents[0] * 0.6);
        const yB = (1 - currents[0]) * 40;
        panelB.titleElement.style.opacity = String(opacities[1]);
        panelB.titleElement.style.transform = `translate3d(0, ${yB}px, 0) scale(${scaleB})`;
      }

      if (panels.length > 2 && panelC.cardElement) {
        const cardScaleC = 0.96 + (currents[1] * 0.06);
        const cardYC = (1 - currents[1]) * 30;
        panelC.cardElement.style.opacity = String(opacities[2]);
        panelC.cardElement.style.transform = `translate3d(0, ${cardYC}px, 0) scale(${cardScaleC})`;
      }

      if (panels.length > 3 && panelD.cardElement) {
        const cardScaleD = 0.96 + (currents[2] * 0.06);
        const cardYD = (1 - currents[2]) * 30;
        panelD.cardElement.style.opacity = String(opacities[3]);
        panelD.cardElement.style.transform = `translate3d(0, ${cardYD}px, 0) scale(${cardScaleD})`;
      }

      if (panels.length > 4 && panelE.cardElement) {
        const cardScaleE = 0.96 + (currents[3] * 0.06);
        const cardYE = (1 - currents[3]) * 30;
        panelE.cardElement.style.opacity = String(opacities[4]);
        panelE.cardElement.style.transform = `translate3d(0, ${cardYE}px, 0) scale(${cardScaleE})`;
      }

      requestAnimationFrame(update);
    }
    
    requestAnimationFrame(update);
  </script>

</body>

</html>
