<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Orientation 2025-2026 - Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 24px;
            pointer-events: none;
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            line-height: 1.1;
            letter-spacing: -0.02em;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .year {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .registration-btn {
            display: inline-block;
            padding: 20px 35px;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
        }

        .registration-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .registration-btn:hover:before {
            left: 100%;
        }

        .registration-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .registration-btn:active {
            transform: scale(0.98);
        }

        .cultural-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
        }

        .sports-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .registration-btn:active {
            transform: scale(0.98);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.4rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .footer {
            margin-top: 40px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
                margin: 15px;
            }

            .title {
                font-size: 2.3rem;
            }

            .subtitle {
                font-size: 1.15rem;
            }

            .registration-btn {
                padding: 18px 28px;
                font-size: 1.1rem;
                letter-spacing: 1px;
            }

            .buttons-container {
                gap: 18px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 20px;
                margin: 10px;
            }

            .title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.05rem;
            }

            .registration-btn {
                padding: 16px 24px;
                font-size: 1rem;
                letter-spacing: 0.8px;
            }

            .icon {
                margin-right: 10px;
                font-size: 1.2rem;
            }
        }

        /* Enhanced loading animation */
        .container {
            animation: fadeInUp 1.2s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle floating effect */
        .container {
            animation: fadeInUp 1.2s ease both, float 6s ease-in-out infinite 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Student Orientation</h1>
            <p class="subtitle">Registration Portal</p>
            <p class="year">2025-2026</p>
        </div>

        <div class="buttons-container">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSd9OPpraa0WzkSClEiMN0SGXQ6IH_jpolCaIKkqt7wIJkiUcg/viewform?usp=header" class="registration-btn cultural-btn" target="_blank">
                <span class="icon">🎭</span>
                Cultural Registration
            </a>

            <a href="https://forms.gle/QDS8i3mBva8HJuxcA" class="registration-btn sports-btn" target="_blank">
                <span class="icon">⚽</span>
                Sports Registration
            </a>
        </div>

        <div class="footer">
            <p>Select your preferred activity to begin registration</p>
        </div>
    </div>
</body>
</html>
